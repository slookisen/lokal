# fly.toml app configuration file generated for lokal on 2026-03-31T15:10:58+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lokal'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '3000'
  MEMORY_LIMIT_MB = '1024'
  # Gårdssalg booking dispatch master switch (dev-request 2026-07-14-booking-flyt-v1).
  # Non-secret feature flag → lives here rather than in Fly secrets. SAFE by the
  # double gate: a booking only dispatches when BOTH this is "true" AND the specific
  # provider's booking_live=1. Today only the hidden catalog_hidden=1 test provider
  # (created via POST /api/opplevelser/admin/gardssalg/test-provider) has booking_live=1,
  # so turning this on routes the notification solely to that test provider's email.
  # To pause again: set to 'false' (fail-safe: anything but the literal "true" = off).
  BOOKING_DISPATCH_ENABLED = 'true'

[[mounts]]
  source = 'lokal_data'
  destination = '/app/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "15s"
    method = "GET"
    path = "/.well-known/agent-card.json"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
