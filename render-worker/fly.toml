# fly.toml for lokal-render-worker — standalone Playwright render service.
# This is a SEPARATE Fly app from the main `lokal` app.
# Deploy with:
#   fly deploy --config render-worker/fly.toml --dockerfile render-worker/Dockerfile

app = 'lokal-render-worker'
primary_region = 'arn'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
  cpus = 1
  memory_mb = 1024
