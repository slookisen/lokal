<html lang="no">
<head>

<title>Du er offline — Rett fra Bonden</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 480px; margin: 4rem auto; padding: 0 1.5rem; color: #1a1a1a; line-height: 1.6; text-align: center; }
  .icon { font-size: 3rem; margin-bottom: 0.5rem; }
  h1 { color: #2d5016; margin: 0 0 0.75rem; }
  p { color: #444; }
  a.retry { display: inline-block; margin-top: 1.5rem; padding: 0.6rem 1.4rem; background: #2d5016; color: #fff; border-radius: 6px; text-decoration: none; font-weight: 600; }

</style>
</head>
<body>
  <div class="icon" aria-hidden="true">🌾</div>
  <h1>Du er offline</h1>
  <p>Vi får ikke kontakt med serveren akkurat nå. Sjekk nettforbindelsen din og prøv igjen.</p>
  <a class="retry" href="/">Prøv igjen</a>
</body>
</html>
