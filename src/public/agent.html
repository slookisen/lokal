<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Rett fra Bonden Agent">
    <meta property="og:description" content="Finn lokal mat og matprodusenter i Norge">
    <meta property="og:url" content="">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Rett fra Bonden">
    <meta name="description" content="Finn lokal mat og matprodusenter i Norge">
    <link rel="canonical" href="">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="apple-touch-icon" href="/logo-200.png">
    <title>Rett fra Bonden</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--dk:#1B4332;--fg:#2D6A4F;--cream:#FEFAE0;--orange:#E76F51;--txt:#1a1a1a;--txtL:#666;--border:#e0e0e0;--bgL:#f9f9f9}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:var(--txt);background:#fff;line-height:1.6}
        .loading{display:flex;justify-content:center;align-items:center;min-height:100vh;font-size:18px;color:var(--fg)}
        .spinner{border:4px solid var(--bgL);border-top:4px solid var(--fg);border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin-right:12px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .error-container{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .error-box{background:var(--cream);border-left:4px solid var(--orange);padding:30px;border-radius:4px;max-width:500px;text-align:center}
        .error-box h1{color:var(--txt);margin-bottom:10px}
        .error-box p{color:var(--txtL);margin-bottom:20px}
        .error-box a{display:inline-block;background:var(--fg);color:#fff;padding:10px 20px;border-radius:4px;text-decoration:none}
        .error-box a:hover{background:var(--dk)}
        .container{max-width:900px;margin:0 auto;padding:0 20px}
        nav{background:var(--dk);padding:12px 20px}
        nav .container{display:flex;justify-content:space-between;align-items:center}
        nav a{color:var(--cream);text-decoration:none;font-weight:600;font-size:18px}
        nav .back{font-size:14px;opacity:0.8}
        nav .back:hover{opacity:1}
        header{background:var(--dk);color:var(--cream);padding:30px 20px 40px}
        .hero-title{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:8px}
        .hero-title h1{font-size:32px;font-weight:700}
        .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
        .badge-verified{background:var(--orange);color:#fff}
        .badge-claimed{background:rgba(254,250,224,0.2);color:var(--cream);border:1px solid rgba(254,250,224,0.4)}
        .city-info{color:rgba(254,250,224,0.8);margin-bottom:16px;font-size:16px}
        .categories{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .cat-tag{background:rgba(254,250,224,0.15);color:var(--cream);padding:4px 12px;border-radius:16px;font-size:13px;border:1px solid rgba(254,250,224,0.3)}
        .trust-section{max-width:250px}
        .trust-label{font-size:13px;color:rgba(254,250,224,0.9);margin-bottom:6px;font-weight:500}
        .trust-bar{background:rgba(254,250,224,0.2);height:8px;border-radius:4px;overflow:hidden}
        .trust-fill{height:100%;border-radius:4px;transition:width .3s}
        .trust-pct{font-size:13px;color:rgba(254,250,224,0.9);margin-top:4px}
        main{padding:40px 20px}
        section{margin-bottom:40px}
        section.hidden{display:none}
        h2{font-size:22px;font-weight:700;color:var(--dk);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--fg)}
        .desc{color:var(--txtL);line-height:1.8;max-width:700px}
        .tags{display:flex;flex-wrap:wrap;gap:8px}
        .tag{background:var(--cream);color:var(--dk);padding:6px 14px;border-radius:20px;font-size:14px;font-weight:500;border:1px solid var(--fg)}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
        .product-card{background:var(--bgL);padding:14px;border-radius:4px;border-left:3px solid var(--fg)}
        .product-name{font-weight:600;color:var(--dk);margin-bottom:4px}
        .product-meta{font-size:12px;color:var(--txtL)}
        .hours-table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:4px;overflow:hidden}
        .hours-table th,.hours-table td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
        .hours-table th{background:var(--fg);color:#fff;font-weight:600}
        .hours-table tr:nth-child(even){background:var(--bgL)}
        .hours-table tr:last-child td{border-bottom:none}
        .contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
        .contact-item{padding:14px;background:var(--bgL);border-radius:4px;border-left:3px solid var(--fg)}
        .contact-label{font-size:11px;color:var(--txtL);text-transform:uppercase;font-weight:600;margin-bottom:4px;letter-spacing:0.5px}
        .contact-value{font-size:15px;color:var(--dk);word-break:break-word}
        .contact-value a{color:var(--fg);text-decoration:none;font-weight:500}
        .contact-value a:hover{color:var(--orange)}
        .map-wrap{border-radius:4px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-top:12px}
        #map{height:350px;width:100%}
        .trust-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
        .trust-card{background:var(--bgL);padding:14px;border-radius:4px;border-left:3px solid var(--orange)}
        .trust-card-label{font-size:11px;color:var(--txtL);text-transform:uppercase;font-weight:600;margin-bottom:6px}
        .trust-card-score{font-size:22px;font-weight:700;color:var(--fg)}
        .trust-card-detail{font-size:12px;color:var(--txtL);margin-top:4px}
        .tips{margin-top:16px}
        .tip{background:var(--cream);padding:10px 14px;border-radius:4px;margin-bottom:8px;font-size:14px;color:var(--dk);border-left:3px solid var(--orange)}
        .cta-section{background:var(--cream);padding:36px;border-radius:4px;text-align:center;border:2px solid var(--fg)}
        .cta-section h2{border:none;margin-bottom:12px}
        .cta-section p{color:var(--txtL);margin-bottom:20px}
        .cta-btn{display:inline-block;background:var(--orange);color:#fff;padding:14px 32px;border-radius:4px;text-decoration:none;font-weight:600;font-size:16px;border:none;cursor:pointer}
        .cta-btn:hover{background:#d45e40}
        .provenance{margin-top:50px;padding:16px 0;border-top:1px solid var(--border);font-size:12px;color:var(--txtL);text-align:center}
        @media(max-width:640px){
            header{padding:20px}
            .hero-title h1{font-size:24px}
            h2{font-size:18px}
            main{padding:24px 16px}
            .products-grid{grid-template-columns:1fr}
            .contact-grid{grid-template-columns:1fr}
            .trust-grid{grid-template-columns:repeat(2,1fr)}
            #map{height:250px}
            .cta-section{padding:24px 16px}
        }
    </style>
</head>
<body>
<div id="app"><div class="loading"><div class="spinner"></div><span>Laster inn...</span></div></div>
<script>
(function(){
    var DAY_NAMES = {mon:'Mandag',tue:'Tirsdag',wed:'Onsdag',thu:'Torsdag',fri:'Fredag',sat:'Lordag',sun:'Sondag',
        monday:'Mandag',tuesday:'Tirsdag',wednesday:'Onsdag',thursday:'Torsdag',friday:'Fredag',saturday:'Lordag',sunday:'Sondag'};
    var CAT_NAMES = {vegetables:'Gronnsaker',fruit:'Frukt',berries:'Baer',dairy:'Meieri',eggs:'Egg',meat:'Kjott',fish:'Fisk',bread:'Brød',honey:'Honning',herbs:'Urter',other:'Annet'};

    function esc(t){if(!t)return '';return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

    function getAgentId(){var m=window.location.pathname.match(/\/agent\/([^/]+)/);return m?m[1]:null}

    function trustColor(score){if(score>=0.7)return '#2D6A4F';if(score>=0.4)return '#E76F51';return '#999'}

    function render(data){
        var a=data.agent||{};
        var k=data.knowledge||{};
        var m=data.meta||{};
        var name=esc(a.name||'Agent');
        var city=esc(a.city||'Norge');
        var ts=Math.round((a.trustScore||0)*100);
        var desc=k.about||'';

        // Update page meta
        document.title=name+' | Rett fra Bonden';
        document.querySelector('meta[property="og:title"]').setAttribute('content',name+' — Rett fra Bonden');
        document.querySelector('meta[property="og:description"]').setAttribute('content',desc?desc.substring(0,160):'Finn '+name+' paa Rett fra Bonden');
        document.querySelector('meta[property="og:url"]').setAttribute('content',window.location.href);
        document.querySelector('meta[name="description"]').setAttribute('content',desc?desc.substring(0,160):'Finn '+name+' paa Rett fra Bonden');
        document.querySelector('link[rel="canonical"]').setAttribute('href',window.location.href);

        var html='';
        // Nav
        html+='<nav><div class="container"><a href="/">Rett fra Bonden</a><a href="/" class="back">Alle agenter</a></div></nav>';
        // Header
        html+='<header><div class="container">';
        html+='<div class="hero-title"><h1>'+name+'</h1>';
        if(a.isVerified) html+='<span class="badge badge-verified">Verifisert</span>';
        else if(a.isClaimed) html+='<span class="badge badge-claimed">Claima</span>';
        html+='</div>';
        html+='<div class="city-info">'+city+'</div>';
        // Categories
        var cats=(a.categories||[]);
        if(cats.length){
            html+='<div class="categories">';
            cats.forEach(function(c){html+='<span class="cat-tag">'+(CAT_NAMES[c]||esc(c))+'</span>'});
            html+='</div>';
        }
        // Trust bar
        html+='<div class="trust-section"><div class="trust-label">Tillitsscore</div>';
        html+='<div class="trust-bar"><div class="trust-fill" style="width:'+ts+'%;background:'+trustColor(a.trustScore)+'"></div></div>';
        html+='<div class="trust-pct">'+ts+'%</div></div>';
        html+='</div></header>';

        html+='<main class="container">';

        // About
        if(desc){html+='<section><h2>Om oss</h2><p class="desc">'+esc(desc)+'</p></section>'}

        // Products
        var products=k.products||[];
        if(products.length){
            html+='<section><h2>Produkter</h2><div class="products-grid">';
            products.forEach(function(p){
                var meta=[];
                if(p.seasonal) meta.push('Sesong');
                if(p.months&&p.months.length) meta.push('Mnd: '+p.months.join(', '));
                if(p.organic) meta.push('Okologisk');
                html+='<div class="product-card"><div class="product-name">'+esc(p.name)+'</div>';
                if(meta.length) html+='<div class="product-meta">'+esc(meta.join(' · '))+'</div>';
                html+='</div>';
            });
            html+='</div></section>';
        }

        // Opening hours
        var hours=k.openingHours||[];
        if(hours.length){
            html+='<section><h2>Apningstider</h2><table class="hours-table"><thead><tr><th>Dag</th><th>Tid</th><th></th></tr></thead><tbody>';
            hours.forEach(function(h){
                var day=DAY_NAMES[(h.day||'').toLowerCase()]||esc(h.day);
                var time=(h.open&&h.close)?h.open+' — '+h.close:'Stengt';
                var note=h.note?esc(h.note):'';
                html+='<tr><td>'+day+'</td><td>'+esc(time)+'</td><td style="font-size:12px;color:#666">'+note+'</td></tr>';
            });
            html+='</tbody></table></section>';
        }

        // Contact
        var contacts=[];
        if(k.address){var addr=esc(k.address);if(k.postalCode)addr+=', '+esc(k.postalCode)+' '+city;contacts.push({label:'Adresse',value:addr})}
        if(k.phone) contacts.push({label:'Telefon',value:'<a href="tel:'+esc(k.phone)+'">'+esc(k.phone)+'</a>'});
        if(k.email) contacts.push({label:'E-post',value:'<a href="mailto:'+esc(k.email)+'">'+esc(k.email)+'</a>'});
        if(k.website){var url=k.website.match(/^http/)?k.website:'https://'+k.website;contacts.push({label:'Nettside',value:'<a href="'+esc(url)+'" target="_blank" rel="noopener">'+esc(k.website)+'</a>'})}
        if(contacts.length){
            html+='<section><h2>Kontakt</h2><div class="contact-grid">';
            contacts.forEach(function(c){html+='<div class="contact-item"><div class="contact-label">'+c.label+'</div><div class="contact-value">'+c.value+'</div></div>'});
            html+='</div></section>';
        }

        // Tags sections
        function tagSection(title,items){
            if(!items||!items.length)return '';
            var h='<section><h2>'+title+'</h2><div class="tags">';
            items.forEach(function(i){h+='<span class="tag">'+esc(i)+'</span>'});
            return h+'</div></section>';
        }
        html+=tagSection('Spesialiteter',k.specialties);
        html+=tagSection('Sertifiseringer',k.certifications);
        html+=tagSection('Betaling',k.paymentMethods);
        html+=tagSection('Levering',k.deliveryOptions);

        // Map placeholder
        html+='<section id="map-section" class="hidden"><h2>Kart</h2><div class="map-wrap"><div id="map"></div></div></section>';

        // Trust breakdown placeholder
        html+='<section id="trust-section"><h2>Tillitsanalyse</h2><div id="trust-grid" class="trust-grid"></div><div id="trust-tips" class="tips"></div></section>';

        // CTA
        if(!a.isClaimed&&!a.isVerified){
            html+='<section class="cta-section"><h2>Er dette din butikk?</h2><p>Krev din agent, oppdater informasjonen og bli mer synlig for kunder.</p>';
            html+='<a href="/selger?agent='+encodeURIComponent(a.name||'')+'" class="cta-btn">Krev butikken</a></section>';
        }

        // Provenance
        var src=m.dataSource==='owner'?'Verifisert av eier':m.dataSource==='hybrid'?'Offentlige kilder + eier':'Offentlige kilder';
        html+='<div class="provenance">'+esc(m.disclaimer||'')+' · Datakilde: '+esc(src)+'</div>';

        html+='</main>';
        document.getElementById('app').innerHTML=html;

        return {agentId:a.id, lat:a.lat, lng:a.lng, name:a.name};
    }

    function renderTrust(data){
        var container=document.getElementById('trust-grid');
        var tipsEl=document.getElementById('trust-tips');
        if(!container||!data||!data.success)return;
        var d=data.data;
        var signals=d.signals||{};
        var html='';
        var labels={verification:'Verifisering',completeness:'Komplett',freshness:'Aktivitet',interaction:'Interaksjon',community:'Fellesskap'};
        Object.keys(signals).forEach(function(key){
            var s=signals[key];
            html+='<div class="trust-card"><div class="trust-card-label">'+labels[key]+'</div>';
            html+='<div class="trust-card-score">'+Math.round(s.value*100)+'%</div>';
            html+='<div class="trust-card-detail">'+esc(s.detail)+'</div></div>';
        });
        container.innerHTML=html;
        if(tipsEl&&d.tips&&d.tips.length){
            var th='';
            d.tips.forEach(function(t){th+='<div class="tip">'+esc(t)+'</div>'});
            tipsEl.innerHTML=th;
        }
    }

    function initMap(lat,lng,name){
        if(!lat||!lng)return;
        var section=document.getElementById('map-section');
        if(section)section.classList.remove('hidden');
        setTimeout(function(){
            var map=L.map('map').setView([lat,lng],14);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'OpenStreetMap',maxZoom:18}).addTo(map);
            L.marker([lat,lng]).bindPopup(esc(name||'')).addTo(map);
        },100);
    }

    async function init(){
        var agentId=getAgentId();
        if(!agentId){
            document.getElementById('app').innerHTML='<div class="error-container"><div class="error-box"><h1>Ugyldig URL</h1><p>Ingen agent-ID funnet.</p><a href="/">Tilbake</a></div></div>';
            return;
        }
        try{
            var res=await fetch('/api/marketplace/agents/'+agentId+'/info');
            if(!res.ok){
                document.getElementById('app').innerHTML='<div class="error-container"><div class="error-box"><h1>Agent ikke funnet</h1><p>Denne agenten finnes ikke.</p><a href="/">Tilbake</a></div></div>';
                return;
            }
            var json=await res.json();
            if(!json.success||!json.data){throw new Error('Invalid response')}

            // Also fetch full agent for lat/lng and categories
            var agentRes=await fetch('/api/marketplace/agents');
            var allAgents=await agentRes.json();
            var fullAgent=(allAgents.agents||[]).find(function(a){return a.id===agentId});

            // Merge data
            var merged=json.data;
            if(fullAgent){
                merged.agent.categories=fullAgent.categories||[];
                merged.agent.lat=fullAgent.lat;
                merged.agent.lng=fullAgent.lng;
            }

            var info=render(merged);

            // Fetch trust breakdown
            var trustRes=await fetch('/api/marketplace/agents/'+agentId+'/trust');
            if(trustRes.ok){var trustData=await trustRes.json();renderTrust(trustData)}

            // Init map
            if(fullAgent&&fullAgent.location){initMap(fullAgent.location.lat,fullAgent.location.lng,info.name)}

        }catch(err){
            console.error(err);
            document.getElementById('app').innerHTML='<div class="error-container"><div class="error-box"><h1>Noe gikk galt</h1><p>Kunne ikke laste data.</p><a href="/">Tilbake</a></div></div>';
        }
    }

    if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',init)}else{init()}
})();
</script>
</body>
</html>
