<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Rett fra Bonden — Sendt-logg</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{color-scheme:light;--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2d3142;--text:#e8eaf0;--text-dim:#8b90a0;--accent:#4ade80;--accent2:#22d3ee;--accent3:#a78bfa;--warn:#fbbf24;--danger:#f87171;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;max-width:380px;width:100%;text-align:center}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-card .subtitle{color:var(--text-dim);font-size:13px;margin-bottom:24px}
.login-card input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;margin-bottom:14px;outline:none}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.login-error{color:var(--danger);font-size:12px;margin-top:10px;display:none}
.app{display:none;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.topbar h1 .logo{width:24px;height:24px}
.topbar-actions{display:flex;align-items:center;gap:10px;font-size:13px}
.kpi{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px}
.kpi .v{font-weight:700;color:var(--accent)}
.kpi .v.warn{color:var(--warn)}
.kpi .v.danger{color:var(--danger)}
button.action{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px}
button.action:hover{border-color:var(--accent)}
.filters{display:flex;align-items:center;gap:8px;padding:10px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.filters label{color:var(--text-dim);font-size:12px;display:inline-flex;align-items:center;gap:6px}
.filters select{padding:6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px}
.filters input[type=text]{padding:6px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:12px;width:240px}
.summary{display:flex;gap:8px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap}
.pill{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:999px;font-size:11px;color:var(--text-dim)}
.pill .v{color:var(--text);font-weight:700;margin-right:4px}
main{flex:1;overflow:auto;padding:0}
table{width:100%;border-collapse:collapse;font-size:13px}
table thead{position:sticky;top:0;background:var(--surface);z-index:1}
table th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-dim);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;cursor:pointer;user-select:none}
table th:hover{color:var(--text)}
table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top}
table tr:hover{background:var(--surface2)}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.tag-sent{background:#16332a;color:#86efac;border:1px solid #4ade80}
.tag-failed{background:#3a1a1d;color:#fca5a5;border:1px solid #f87171}
.tag-draft{background:#3a2f1d;color:#fcd34d;border:1px solid #fbbf24}
.tag-queued{background:#1d2c3a;color:#93c5fd;border:1px solid #60a5fa}
.tag-claude{background:#2b1d3a;color:#c4b5fd;border:1px solid #a78bfa}
.tag-daniel{background:#1d3a3a;color:#67e8f9;border:1px solid #22d3ee}
.tag-resend{background:#16332a;color:#86efac;border:1px solid #4ade80}
.tag-gmail{background:#3a2f1d;color:#fcd34d;border:1px solid #fbbf24}
.tag-thread-compose{background:#3a1d2c;color:#f9a8d4;border:1px solid #ec4899}
.tag-thread-inbound{background:#1d2c3a;color:#93c5fd;border:1px solid #60a5fa}
a{color:var(--accent2);text-decoration:none}
a:hover{text-decoration:underline}
.dim{color:var(--text-dim)}
.empty{text-align:center;padding:48px;color:var(--text-dim)}
.dup-warning{color:var(--warn);font-size:11px;margin-top:4px}
.row-dup td{background:#2d2517}
.row-dup:hover td{background:#3a2f1d}
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <img src="/logo-200.png" alt="" style="width:40px;height:40px;margin-bottom:12px"/>
    <h1>Sendt-logg</h1>
    <p class="subtitle">Lim inn admin-nøkkel</p>
    <input type="password" id="adminKeyInput" placeholder="X-Admin-Key" autocomplete="off">
    <button id="loginBtn" onclick="login()">Logg inn</button>
    <div class="login-error" id="loginError">Feil nøkkel</div>
  </div>
</div>

<div id="app" class="app">
  <div class="topbar">
    <h1>
      <img src="/logo-200.png" class="logo" alt=""/>
      Sendt-logg <span class="dim">— alle utsendte e-poster fra kontakt@rettfrabonden.com</span>
    </h1>
    <div class="topbar-actions">
      <span class="kpi">total <span class="v" id="kpiTotal">0</span></span>
      <span class="kpi">sent <span class="v" id="kpiSent">0</span></span>
      <span class="kpi">draft <span class="v warn" id="kpiDraft">0</span></span>
      <span class="kpi">duplikater <span class="v warn" id="kpiDup">0</span></span>
      <button class="action" onclick="loadData()">↻ Oppdater</button>
      <button class="action" onclick="logout()">Logg ut</button>
    </div>
  </div>

  <div class="filters">
    <label>Periode:
      <select id="filterSince">
        <option value="24">Siste 24t</option>
        <option value="168" selected>Siste 7d</option>
        <option value="720">Siste 30d</option>
        <option value="all">Alt</option>
      </select>
    </label>
    <label>Kanal:
      <select id="filterChannel">
        <option value="all">Alle</option>
        <option value="resend_smtp">Resend (sendt)</option>
        <option value="gmail_draft">Gmail draft</option>
      </select>
    </label>
    <label>Avsender:
      <select id="filterActor">
        <option value="all">Alle</option>
        <option value="claude">Claude (autonomt)</option>
        <option value="daniel">Daniel (manuelt)</option>
      </select>
    </label>
    <label>Status:
      <select id="filterStatus">
        <option value="all">Alle</option>
        <option value="sent">sent</option>
        <option value="draft_in_gmail">draft_in_gmail</option>
        <option value="queued">queued</option>
        <option value="failed">failed</option>
      </select>
    </label>
    <label>Søk:
      <input type="text" id="filterSearch" placeholder="mottaker, emne...">
    </label>
    <span class="dim" style="margin-left:auto" id="generatedAt"></span>
  </div>

  <div class="summary" id="summary"></div>

  <main>
    <table id="table">
      <thead>
        <tr>
          <th data-sort="when">Tidspunkt ▼</th>
          <th data-sort="recipient">Mottaker</th>
          <th data-sort="subject">Emne</th>
          <th data-sort="actor">Avsender</th>
          <th data-sort="channel">Kanal</th>
          <th data-sort="status">Status</th>
          <th>Tråd</th>
        </tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="7" class="empty">Laster...</td></tr></tbody>
    </table>
  </main>
</div>

<script>
const STORE_KEY = 'rfb_admin_key';
let allMessages = [];
let sortField = 'when';
let sortDir = -1; // -1 = desc, 1 = asc

function login(){
  const k = document.getElementById('adminKeyInput').value.trim();
  if(!k){ showError(); return; }
  // Test the key against /admin/crm/summary
  fetch('/admin/crm/summary', { headers: { 'X-Admin-Key': k } })
    .then(r => { if(!r.ok) throw new Error(); localStorage.setItem(STORE_KEY, k); showApp(); loadData(); })
    .catch(() => showError());
}
function showError(){ document.getElementById('loginError').style.display='block'; }
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='flex';
}
function logout(){ localStorage.removeItem(STORE_KEY); location.reload(); }

function getKey(){ return localStorage.getItem(STORE_KEY) || ''; }

function loadData(){
  const since = document.getElementById('filterSince').value;
  const channel = document.getElementById('filterChannel').value;
  const actor = document.getElementById('filterActor').value;
  const status = document.getElementById('filterStatus').value;
  const url = `/admin/crm/sent-log?since_hours=${since}&channel=${channel}&actor=${actor}&status=${status}&limit=1000`;
  fetch(url, { headers: { 'X-Admin-Key': getKey() } })
    .then(r => { if(r.status === 401){ logout(); return; } return r.json(); })
    .then(data => { if(data) renderData(data); })
    .catch(e => console.error(e));
}

function renderData(data){
  allMessages = data.messages || [];
  document.getElementById('generatedAt').textContent = 'Generert ' + new Date(data.generated_at).toLocaleString('nb-NO');
  document.getElementById('kpiTotal').textContent = data.count;
  document.getElementById('kpiSent').textContent = (data.summary?.by_status?.sent || 0);
  document.getElementById('kpiDraft').textContent = (data.summary?.by_status?.draft_in_gmail || 0);

  // Detect duplicates: same recipient with multiple sent messages in 24h windows
  const byRecipient = {};
  for(const m of allMessages){
    const to = (m.contact_email || '').toLowerCase();
    if(!to) continue;
    if(!byRecipient[to]) byRecipient[to] = [];
    byRecipient[to].push(m);
  }
  let dupCount = 0;
  const dupSet = new Set();
  for(const to in byRecipient){
    const arr = byRecipient[to].slice().sort((a,b)=>{
      const ta = new Date(a.sent_at || a.received_at).getTime();
      const tb = new Date(b.sent_at || b.received_at).getTime();
      return ta-tb;
    });
    for(let i=1;i<arr.length;i++){
      const prev = arr[i-1], cur = arr[i];
      const dt = new Date(cur.sent_at || cur.received_at).getTime() - new Date(prev.sent_at || prev.received_at).getTime();
      if(dt < 24*3600*1000){
        dupSet.add(cur.message_id);
        dupCount++;
      }
    }
  }
  document.getElementById('kpiDup').textContent = dupCount;

  // Summary pills
  const summary = data.summary || {};
  const sumEl = document.getElementById('summary');
  sumEl.innerHTML = '';
  const sectionsEl = [
    ['Status', summary.by_status],
    ['Avsender', summary.by_actor],
    ['Kanal', summary.by_channel],
  ];
  for(const [label, obj] of sectionsEl){
    if(!obj || !Object.keys(obj).length) continue;
    for(const [k,v] of Object.entries(obj)){
      const span = document.createElement('span');
      span.className = 'pill';
      span.innerHTML = `<span class="v">${v}</span>${label.toLowerCase()}: ${k}`;
      sumEl.appendChild(span);
    }
  }

  renderTable(dupSet);
}

function renderTable(dupSet){
  const tbody = document.getElementById('tbody');
  if(!allMessages.length){
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Ingen utsendinger i valgt periode/filter.</td></tr>';
    return;
  }
  // Apply text filter
  const search = (document.getElementById('filterSearch').value || '').toLowerCase().trim();
  let filtered = search
    ? allMessages.filter(m =>
        (m.contact_email||'').toLowerCase().includes(search) ||
        (m.contact_name||'').toLowerCase().includes(search) ||
        (m.subject||'').toLowerCase().includes(search) ||
        (m.thread_subject||'').toLowerCase().includes(search))
    : allMessages.slice();

  // Sort
  filtered.sort((a,b) => {
    let va, vb;
    switch(sortField){
      case 'when': va = a.sent_at || a.received_at; vb = b.sent_at || b.received_at; break;
      case 'recipient': va = (a.contact_email||'').toLowerCase(); vb = (b.contact_email||'').toLowerCase(); break;
      case 'subject': va = (a.subject||'').toLowerCase(); vb = (b.subject||'').toLowerCase(); break;
      case 'actor': va = a.actor||''; vb = b.actor||''; break;
      case 'channel': va = a.channel||''; vb = b.channel||''; break;
      case 'status': va = a.delivery_status||''; vb = b.delivery_status||''; break;
      default: va = '' ; vb = '';
    }
    if(va < vb) return -sortDir;
    if(va > vb) return sortDir;
    return 0;
  });

  const html = filtered.map(m => {
    const when = m.sent_at || m.received_at || '';
    const whenFmt = when ? new Date(when).toLocaleString('nb-NO', {day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';
    const recipient = m.contact_name ? `${esc(m.contact_name)}<br><span class="dim">${esc(m.contact_email||'')}</span>` : esc(m.contact_email||'?');
    const subject = esc(m.subject || m.thread_subject || '(uten emne)');
    const actorTag = m.actor === 'claude' ? '<span class="tag tag-claude">claude</span>'
                    : m.actor === 'daniel' ? '<span class="tag tag-daniel">daniel</span>'
                    : '<span class="tag dim">?</span>';
    const channelTag = m.channel?.includes('resend') ? '<span class="tag tag-resend">resend</span>'
                      : m.channel?.includes('gmail') ? '<span class="tag tag-gmail">gmail</span>'
                      : `<span class="dim">${esc(m.channel||'-')}</span>`;
    const statusTag = m.delivery_status === 'sent' ? '<span class="tag tag-sent">sent</span>'
                    : m.delivery_status === 'failed' ? '<span class="tag tag-failed">failed</span>'
                    : m.delivery_status === 'draft_in_gmail' ? '<span class="tag tag-draft">draft</span>'
                    : m.delivery_status === 'queued' ? '<span class="tag tag-queued">queued</span>'
                    : `<span class="dim">${esc(m.delivery_status||'-')}</span>`;
    const threadOriginTag = m.thread_origin === 'compose'
      ? '<span class="tag tag-thread-compose" title="Ny tråd opprettet av /compose — ikke koblet til opprinnelig inbound">compose</span>'
      : '<span class="tag tag-thread-inbound" title="Reply på opprinnelig inbound-tråd">inbound</span>';
    const isDup = dupSet.has(m.message_id);
    const dupNote = isDup ? '<div class="dup-warning">⚠ duplikat (samme mottaker &lt;24t)</div>' : '';
    return `<tr class="${isDup?'row-dup':''}">
      <td>${whenFmt}${dupNote}</td>
      <td>${recipient}</td>
      <td>${subject}</td>
      <td>${actorTag}</td>
      <td>${channelTag}</td>
      <td>${statusTag}</td>
      <td>${threadOriginTag} <a href="/admin/crm-dashboard" target="_blank" title="${esc(m.thread_id)}">åpne CRM ↗</a></td>
    </tr>`;
  }).join('');
  tbody.innerHTML = html;
}

function esc(s){ return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// Sort handlers
document.querySelectorAll('th[data-sort]').forEach(th => {
  th.addEventListener('click', () => {
    const f = th.dataset.sort;
    if(sortField === f){ sortDir = -sortDir; } else { sortField = f; sortDir = -1; }
    document.querySelectorAll('th[data-sort]').forEach(x => x.textContent = x.textContent.replace(/[▲▼]/g,'').trim());
    th.textContent = th.textContent.trim() + ' ' + (sortDir < 0 ? '▼' : '▲');
    renderTable(new Set([...document.querySelectorAll('.row-dup')].map(tr => tr.dataset.id || '')));
    // simpler: just re-render
    loadData();
  });
});

// Filter handlers
['filterSince','filterChannel','filterActor','filterStatus'].forEach(id => {
  document.getElementById(id).addEventListener('change', loadData);
});
document.getElementById('filterSearch').addEventListener('input', () => {
  // local-only filter, no server roundtrip
  renderTable(new Set());
});

// Login on Enter
document.getElementById('adminKeyInput').addEventListener('keydown', e => { if(e.key === 'Enter') login(); });

// Auto-login if key already stored
if(getKey()){ showApp(); loadData(); }
</script>
</body>
</html>
