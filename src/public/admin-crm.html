<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<title>Rett fra Bonden — CRM</title>
<meta name="robots" content="noindex, nofollow">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2d3142;--text:#e8eaf0;--text-dim:#8b90a0;--accent:#4ade80;--accent2:#22d3ee;--accent3:#a78bfa;--warn:#fbbf24;--danger:#f87171;--radius:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* Login */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;max-width:380px;width:100%;text-align:center}
.login-card h1{font-size:20px;font-weight:600;margin-bottom:6px}
.login-card .subtitle{color:var(--text-dim);font-size:13px;margin-bottom:24px}
.login-card input{width:100%;padding:11px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;margin-bottom:14px;outline:none}
.login-card input:focus{border-color:var(--accent)}
.login-card button{width:100%;padding:11px;background:var(--accent);color:#000;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.login-error{color:var(--danger);font-size:12px;margin-top:10px;display:none}

/* Layout */
.app{display:none;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.topbar h1{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px}
.topbar h1 .logo{width:24px;height:24px}
.topbar-actions{display:flex;align-items:center;gap:10px;font-size:13px}
.kpi{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;font-size:12px}
.kpi.warn{border-color:var(--warn);color:var(--warn)}
.kpi .num{font-weight:700;font-size:14px}
.btn-sm{padding:6px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:12px;cursor:pointer}
.btn-sm:hover{color:var(--text)}

.tabs{display:flex;gap:0;padding:0 24px;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{padding:12px 18px;color:var(--text-dim);cursor:pointer;border-bottom:2px solid transparent;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.tab .badge{background:var(--surface2);padding:2px 7px;border-radius:10px;font-size:11px;font-weight:600}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab.active .badge{background:var(--accent);color:#000}
.tab:hover{color:var(--text)}

.main{display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden}
@media(max-width:1100px){.main{grid-template-columns:280px 1fr}}

.list-pane{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.list-search{padding:10px 14px;border-bottom:1px solid var(--border)}
.list-search input{width:100%;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.contact-list{flex:1;overflow-y:auto}
.contact-row{padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:4px}
.contact-row:hover{background:var(--surface)}
.contact-row.active{background:var(--surface);border-left:3px solid var(--accent);padding-left:11px}
.contact-row .head{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.contact-row .name{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.contact-row .time{color:var(--text-dim);font-size:11px;flex-shrink:0}
.contact-row .email{color:var(--text-dim);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.contact-row .meta{display:flex;gap:6px;align-items:center;margin-top:2px;font-size:11px;color:var(--text-dim)}
.dot-new{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:4px}
.dot-await{background:var(--warn)}
.empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}

.detail-pane{overflow-y:auto;padding:0}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:14px;text-align:center;padding:20px}
.detail-header{padding:18px 24px;border-bottom:1px solid var(--border);background:var(--surface)}
.detail-header h2{font-size:18px;font-weight:600;margin-bottom:6px}
.detail-header .sub{color:var(--text-dim);font-size:13px;display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.detail-header .actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:14px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text-dim)}
.pill.producer{background:#4ade8022;color:#4ade80}
.pill.marketing{background:#a78bfa22;color:#a78bfa}
.pill.vendor{background:#22d3ee22;color:#22d3ee}
.pill.unknown{background:#fbbf2422;color:#fbbf24}
.pill.p0{background:#f8717122;color:#f87171}
.pill.p1{background:#fbbf2422;color:#fbbf24}
.select{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;cursor:pointer;outline:none}

.threads-section{padding:18px 24px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-dim);margin-bottom:12px}
.thread-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer}
.thread-card:hover{border-color:var(--accent)}
.thread-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.thread-card .top{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:6px}
.thread-card .subject{font-weight:600;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.thread-card .info{display:flex;gap:10px;color:var(--text-dim);font-size:11px}

.timeline{padding:18px 24px;border-top:1px solid var(--border);background:var(--bg)}
.message{display:flex;gap:12px;margin-bottom:18px;align-items:flex-start}
.message .avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.message.in .avatar{background:var(--accent2);color:#000}
.message.out .avatar{background:var(--accent);color:#000}
.message .content{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.message.out .content{background:#1a2d22;border-color:#2d4a3a}
.message .meta-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-bottom:6px}
.message .body{font-size:13px;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.message .body.collapsed{max-height:120px;overflow:hidden;position:relative}
.message .body.collapsed::after{content:'';position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--surface))}
.message.out .body.collapsed::after{background:linear-gradient(transparent,#1a2d22)}
.message .show-more{color:var(--accent2);font-size:12px;cursor:pointer;display:inline-block;margin-top:6px}

.compose{padding:18px 24px;background:var(--surface);border-top:1px solid var(--border)}
.compose textarea{width:100%;min-height:140px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;line-height:1.5;outline:none;resize:vertical}
.compose textarea:focus{border-color:var(--accent)}
.compose .row{display:flex;gap:10px;margin-top:10px;align-items:center;flex-wrap:wrap}
.compose .row label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-dim);cursor:pointer}
.compose .row input[type=text]{flex:1;min-width:200px;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px}
.compose .send-row{display:flex;justify-content:space-between;margin-top:14px;flex-wrap:wrap;gap:8px}
.compose .modes{display:flex;gap:14px;font-size:12px;color:var(--text-dim);align-items:center}
.compose .modes input[type=radio]{margin:0}
.btn-primary{padding:8px 18px;background:var(--accent);color:#000;border:none;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
.btn-primary:disabled{opacity:0.5;cursor:wait}
.btn-secondary{padding:8px 14px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:12px}

.notes-section{padding:14px 24px;background:var(--surface);border-top:1px solid var(--border)}
.notes-section textarea{width:100%;min-height:60px;padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;font-family:inherit;outline:none;resize:vertical}

.actions-log{padding:14px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--text-dim)}
.actions-log .log-row{padding:6px 0;display:flex;gap:10px;border-bottom:1px solid var(--border)}
.actions-log .log-row:last-child{border:none}
.actions-log .when{color:var(--text-dim);min-width:120px}
.actions-log .what{flex:1}

.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;background:var(--surface);border:1px solid var(--accent);border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:13px;z-index:1000;display:none}
.toast.error{border-color:var(--danger);color:var(--danger)}
.toast.show{display:block}

.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--text-dim);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>🌾 CRM</h1>
    <div class="subtitle">Rett fra Bonden — kundeoppfølging</div>
    <input type="password" id="adminKey" placeholder="Admin-nøkkel" autofocus>
    <button data-action="login">Logg inn</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<div class="app" id="app">
  <div class="topbar">
    <h1>
      <img src="/logo-200.png" class="logo" alt=""/>
      Rett fra Bonden — CRM
    </h1>
    <div class="topbar-actions" id="kpis">
      <span class="kpi" id="kpiP0" style="display:none"><span class="num">0</span> P0</span>
      <span class="kpi"><span class="num" id="kpiNew">0</span> nye</span>
      <span class="kpi warn"><span class="num" id="kpiAwait">0</span> venter</span>
      <span class="kpi"><span class="num" id="kpiOutbox">0</span> i kø</span>
      <button class="btn-sm" data-action="refresh">↻ Oppdater</button>
      <button class="btn-sm" data-action="logout">Logg ut</button>
    </div>
  </div>

  <div class="tabs" id="tabs">
    <div class="tab active" data-type="producer">Kunder <span class="badge" id="cnt-producer">0</span></div>
    <div class="tab" data-type="marketing">Markedsføring <span class="badge" id="cnt-marketing">0</span></div>
    <div class="tab" data-type="vendor">Leverandører <span class="badge" id="cnt-vendor">0</span></div>
    <div class="tab" data-type="unknown">Ukjent <span class="badge" id="cnt-unknown">0</span></div>
  </div>

  <div class="main">
    <div class="list-pane">
      <div class="list-search">
        <input type="text" id="searchInput" placeholder="Søk e-post eller navn..." data-action="search">
      </div>
      <div class="contact-list" id="contactList">
        <div class="empty">Laster…</div>
      </div>
    </div>

    <div class="detail-pane" id="detailPane">
      <div class="detail-empty">← Velg en kontakt</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/admin/crm';
let adminKey = sessionStorage.getItem('rfb_admin_key') || '';
let activeType = 'producer';
let activeContactId = null;
let activeThreadId = null;
let searchTimer = null;

if (adminKey) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

async function login() {
  const key = document.getElementById('adminKey').value.trim();
  if (!key) return;
  const res = await fetch(API + '/summary', { headers: { 'X-Admin-Key': key } });
  if (!res.ok) {
    document.getElementById('loginError').textContent = 'Feil nøkkel';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  adminKey = key;
  sessionStorage.setItem('rfb_admin_key', key);
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  init();
}

function logout() {
  sessionStorage.removeItem('rfb_admin_key');
  location.reload();
}

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    ...opts,
    headers: { ...(opts.headers || {}), 'X-Admin-Key': adminKey, ...(opts.body ? { 'Content-Type': 'application/json' } : {}) }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`${res.status}: ${txt}`);
  }
  return res.json();
}

function toast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z');
  const now = new Date();
  const diffH = (now - d) / 3600000;
  if (diffH < 1) return Math.round(diffH * 60) + ' min';
  if (diffH < 24) return Math.round(diffH) + ' t';
  if (diffH < 24 * 7) return Math.round(diffH / 24) + ' d';
  return d.toLocaleDateString('no');
}

function fmtFull(iso) {
  if (!iso) return '';
  const d = new Date(iso.includes('T') ? iso : iso.replace(' ', 'T') + 'Z');
  return d.toLocaleString('no');
}

async function init() {
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    activeType = t.dataset.type;
    activeContactId = null;
    activeThreadId = null;
    document.getElementById('detailPane').innerHTML = '<div class="detail-empty">← Velg en kontakt</div>';
    loadContacts();
  }));
  await refresh();
}

async function refresh() {
  await Promise.all([loadSummary(), loadContacts()]);
  if (activeContactId) await loadContactDetail(activeContactId);
}

async function loadSummary() {
  try {
    const s = await api('/summary');
    document.getElementById('cnt-producer').textContent = s.contacts.producer;
    document.getElementById('cnt-marketing').textContent = s.contacts.marketing;
    document.getElementById('cnt-vendor').textContent = s.contacts.vendor;
    document.getElementById('cnt-unknown').textContent = s.contacts.unknown;
    document.getElementById('kpiNew').textContent = s.threads.new;
    document.getElementById('kpiAwait').textContent = s.threads.awaiting_review;
    document.getElementById('kpiOutbox').textContent = s.outbox.pending;
    if (s.threads.p0_open > 0) {
      document.getElementById('kpiP0').firstElementChild.textContent = s.threads.p0_open;
      document.getElementById('kpiP0').style.display = 'inline-flex';
    } else {
      document.getElementById('kpiP0').style.display = 'none';
    }
  } catch (e) { toast(e.message, true); }
}

function onSearchChange() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadContacts, 250);
}

async function loadContacts() {
  const search = document.getElementById('searchInput').value.trim();
  const qs = new URLSearchParams({ type: activeType, limit: '200' });
  if (search) qs.set('search', search);
  try {
    const { contacts } = await api('/contacts?' + qs);
    const list = document.getElementById('contactList');
    if (!contacts.length) {
      list.innerHTML = '<div class="empty">Ingen kontakter ennå</div>';
      return;
    }
    list.innerHTML = contacts.map(c => `
      <div class="contact-row ${c.id === activeContactId ? 'active' : ''}" data-action="selectContact" data-id="${c.id}">
        <div class="head">
          <div class="name">${escapeHtml(c.name || c.organization || c.email)}</div>
          <div class="time">${fmtTime(c.last_message_at)}</div>
        </div>
        <div class="email">${escapeHtml(c.email)}${c.agent_name ? ' · ' + escapeHtml(c.agent_name) : ''}</div>
        <div class="meta">
          ${c.new_count > 0 ? `<span class="dot-new"></span>${c.new_count} ny${c.new_count > 1 ? 'e' : ''}` : ''}
          ${c.awaiting_count > 0 ? `<span class="dot-new dot-await"></span>${c.awaiting_count} venter` : ''}
          ${c.thread_count} tråd${c.thread_count !== 1 ? 'er' : ''}
        </div>
      </div>
    `).join('');
  } catch (e) { toast(e.message, true); }
}

async function selectContact(id) {
  activeContactId = id;
  activeThreadId = null;
  document.querySelectorAll('.contact-row').forEach(r => r.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  await loadContactDetail(id);
}

async function loadContactDetail(id) {
  try {
    const data = await api('/contacts/' + id);
    const c = data.contact;
    const threads = data.threads;
    const actions = data.actions;

    document.getElementById('detailPane').innerHTML = `
      <div class="detail-header">
        <h2>${escapeHtml(c.name || c.organization || c.email)}</h2>
        <div class="sub">
          <span>${escapeHtml(c.email)}</span>
          ${c.domain ? `<span>· ${escapeHtml(c.domain)}</span>` : ''}
          ${c.agent_name ? `<span>· Produsent: <a href="/produsent/${slugify(c.agent_name)}" target="_blank" style="color:var(--accent2)">${escapeHtml(c.agent_name)}</a></span>` : ''}
        </div>
        <div class="actions">
          <span class="pill ${c.type}">${c.type}</span>
          <select class="select" id="reclassify" data-action="reclassifyContact" data-id="${c.id}">
            <option value="">Endre type…</option>
            <option value="producer">→ Kunde (Produsent)</option>
            <option value="marketing">→ Markedsføring</option>
            <option value="vendor">→ Leverandør</option>
            <option value="unknown">→ Ukjent</option>
          </select>
          <select class="select" data-action="setContactStatus" data-id="${c.id}">
            <option value="">Status: ${c.status}</option>
            <option value="active">Aktiv</option>
            <option value="blocked">Blokker</option>
            <option value="archived">Arkiver</option>
          </select>
        </div>
      </div>

      <div class="threads-section">
        <div class="section-title">Tråder (${threads.length})</div>
        ${threads.length ? threads.map(t => `
          <div class="thread-card ${t.id === activeThreadId ? 'active' : ''}" data-action="selectThread" data-id="${t.id}">
            <div class="top">
              <div class="subject">${escapeHtml(t.subject || '(uten emne)')}</div>
              <div class="info">
                ${t.severity && t.severity !== 'normal' ? `<span class="pill ${t.severity}">${t.severity.toUpperCase()}</span>` : ''}
                <span>${t.status}</span>
                <span>${t.message_count} msg</span>
                <span>${fmtTime(t.last_message_at)}</span>
              </div>
            </div>
          </div>
        `).join('') : '<div class="empty">Ingen tråder ennå</div>'}
      </div>

      <div class="notes-section">
        <div class="section-title">Notater om kontakt</div>
        <textarea id="contactNotes" placeholder="Notater om denne kontakten…" data-action="saveContactNotes" data-id="${c.id}">${escapeHtml(c.notes || '')}</textarea>
      </div>

      <div id="threadDetail"></div>

      <div class="actions-log">
        <div class="section-title">Historikk (${actions.length})</div>
        ${actions.slice(0, 20).map(a => `
          <div class="log-row">
            <span class="when">${fmtFull(a.created_at)}</span>
            <span class="what">[${a.actor}] ${a.type}${a.payload && a.payload !== '{}' ? ` — ${escapeHtml(a.payload).slice(0, 80)}` : ''}</span>
          </div>
        `).join('')}
      </div>
    `;
  } catch (e) { toast(e.message, true); }
}

async function selectThread(id) {
  activeThreadId = id;
  document.querySelectorAll('.thread-card').forEach(c => c.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  try {
    const data = await api('/threads/' + id);
    const t = data.thread;
    const messages = data.messages;
    const detail = document.getElementById('threadDetail');
    detail.innerHTML = `
      <div class="timeline">
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
          <span>${escapeHtml(t.subject || '(uten emne)')}</span>
          <span style="display:flex;gap:8px">
            <select class="select" data-action="setThreadStatus" data-id="${t.id}">
              <option value="">Status: ${t.status}</option>
              <option value="new">Ny</option>
              <option value="in_progress">Under arbeid</option>
              <option value="awaiting_review">Venter på Daniel</option>
              <option value="done">Ferdig</option>
              <option value="archived">Arkivert</option>
            </select>
            ${t.status !== 'done' && t.status !== 'archived' ? `<button class="btn-secondary" data-action="markDone" data-id="${t.id}" title="Sett ferdig">✓ Ferdig</button>` : ''}
            <select class="select" data-action="setAssignee" data-id="${t.id}">
              <option value="">Tildelt: ${t.assigned_to}</option>
              <option value="claude">Claude</option>
              <option value="daniel">Daniel</option>
              <option value="unassigned">Ingen</option>
            </select>
          </span>
        </div>
        ${messages.map(m => renderMessage(m)).join('')}
      </div>

      <div class="compose">
        <div class="section-title">Svar</div>
        <input type="text" id="composeTo" value="${escapeHtml(messages.find(m=>m.direction==='in')?.from_email || t.contact_email)}" style="width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;margin-bottom:10px">
        <input type="text" id="composeSubject" value="${escapeHtml((t.subject || '').startsWith('Re:') ? t.subject : 'Re: ' + (t.subject || ''))}" style="width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;margin-bottom:10px">
        <textarea id="composeBody" placeholder="Skriv svar her…"></textarea>
        <div class="send-row">
          <div class="modes">
            <label><input type="radio" name="sendMode" value="gmail_draft" checked> Lag draft i Gmail</label>
            <label><input type="radio" name="sendMode" value="resend_send"> Send nå (Resend)</label>
          </div>
          <button class="btn-primary" data-action="sendReply" data-id="${t.id}" id="sendBtn">Send</button>
        </div>
      </div>

      <div class="notes-section">
        <div class="section-title">Notater på tråd</div>
        <textarea id="threadNotes" placeholder="Notater spesifikt for denne tråden…" data-action="saveThreadNotes" data-id="${t.id}">${escapeHtml(t.notes || '')}</textarea>
      </div>
    `;
    detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch (e) { toast(e.message, true); }
}

function renderMessage(m) {
  const initial = (m.from_email || '?').charAt(0).toUpperCase();
  const body = m.body_text || m.snippet || '(ingen tekst)';
  const long = body.length > 400;
  return `
    <div class="message ${m.direction}">
      <div class="avatar">${initial}</div>
      <div class="content">
        <div class="meta-row">
          <span><strong>${escapeHtml(m.from_email)}</strong></span>
          <span>${fmtFull(m.sent_at || m.received_at)}</span>
        </div>
        <div class="body${long ? ' collapsed' : ''}" id="msg-${m.id}">${escapeHtml(body)}</div>
        ${long ? `<span class="show-more" data-action="toggleMsg" data-id="${m.id}">Vis mer ▾</span>` : ''}
      </div>
    </div>
  `;
}

async function setThreadStatus(id, status) {
  if (!status) return;
  try { await api('/threads/' + id + '/status', { method: 'POST', body: JSON.stringify({ status }) }); toast('Status oppdatert'); refresh(); }
  catch (e) { toast(e.message, true); }
}

async function setAssignee(id, assignedTo) {
  if (!assignedTo) return;
  try { await api('/threads/' + id + '/assignee', { method: 'POST', body: JSON.stringify({ assignedTo }) }); toast('Tildelt'); refresh(); }
  catch (e) { toast(e.message, true); }
}

async function reclassifyContact(id, type) {
  if (!type) return;
  try { await api('/contacts/' + id + '/type', { method: 'POST', body: JSON.stringify({ type }) }); toast('Type endret'); refresh(); }
  catch (e) { toast(e.message, true); }
}

async function setContactStatus(id, status) {
  if (!status) return;
  try { await api('/contacts/' + id + '/status', { method: 'POST', body: JSON.stringify({ status }) }); toast('Status endret'); refresh(); }
  catch (e) { toast(e.message, true); }
}

async function saveContactNotes(id) {
  const notes = document.getElementById('contactNotes').value;
  try { await api('/contacts/' + id + '/notes', { method: 'POST', body: JSON.stringify({ notes }) }); toast('Notater lagret'); }
  catch (e) { toast(e.message, true); }
}

async function saveThreadNotes(id) {
  const notes = document.getElementById('threadNotes').value;
  try { await api('/threads/' + id + '/notes', { method: 'POST', body: JSON.stringify({ notes }) }); toast('Notater lagret'); }
  catch (e) { toast(e.message, true); }
}

async function sendReply(threadId) {
  const to = document.getElementById('composeTo').value.trim();
  const subject = document.getElementById('composeSubject').value.trim();
  const body = document.getElementById('composeBody').value.trim();
  const mode = document.querySelector('input[name=sendMode]:checked').value;
  if (!to || !subject || !body) { toast('Fyll inn alle felter', true); return; }
  if (mode === 'resend_send' && !confirm(`Sende e-post nå til ${to}?\n\nDenne kan ikke trekkes tilbake.`)) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  try {
    const r = await api('/threads/' + threadId + '/send', {
      method: 'POST',
      body: JSON.stringify({
        intent: mode,
        toEmails: [to],
        subject,
        bodyText: body,
        createdBy: 'daniel',
      })
    });
    toast(mode === 'resend_send' ? 'Sendt!' : 'Lagt i kø — agent oppretter draft ved neste kjøring');
    document.getElementById('composeBody').value = '';
    refresh();
  } catch (e) { toast(e.message, true); }
  finally { btn.disabled = false; btn.textContent = 'Send'; }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function slugify(s) {
  return String(s).toLowerCase().replace(/æ/g,'ae').replace(/ø/g,'o').replace(/å/g,'a').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
}

// ─── Event delegation (CSP-safe — no inline handlers) ───
const ACTIONS = {
  login, logout, refresh,
  markDone: id => setThreadStatus(id, 'done'),
  search: onSearchChange,
  selectContact: id => selectContact(id),
  selectThread: id => selectThread(id),
  toggleMsg: id => document.getElementById('msg-' + id)?.classList.toggle('collapsed'),
  sendReply: id => sendReply(id),
  reclassifyContact: (id, val) => reclassifyContact(id, val),
  setContactStatus: (id, val) => setContactStatus(id, val),
  setThreadStatus: (id, val) => setThreadStatus(id, val),
  setAssignee: (id, val) => setAssignee(id, val),
  saveContactNotes: id => saveContactNotes(id),
  saveThreadNotes: id => saveThreadNotes(id),
};

function dispatchAction(e, eventType) {
  let el = e.target;
  // Walk up to find element with data-action (handles clicks on child nodes)
  while (el && el !== document.body && !el.dataset.action) el = el.parentElement;
  if (!el || !el.dataset.action) return;
  const action = el.dataset.action;
  const fn = ACTIONS[action];
  if (!fn) return;
  const id = el.dataset.id;
  const val = el.value;
  // For change events on selects, pass id+val. For others, just id.
  if (eventType === 'change') {
    fn(id, val);
  } else {
    fn(id);
  }
}

document.body.addEventListener('click', e => dispatchAction(e, 'click'));
document.body.addEventListener('change', e => dispatchAction(e, 'change'));
document.body.addEventListener('input', e => {
  if (e.target.id === 'searchInput') onSearchChange();
});
// blur doesn't bubble — capture phase
document.body.addEventListener('blur', e => dispatchAction(e, 'blur'), true);
// Enter key on adminKey input
document.body.addEventListener('keypress', e => {
  if (e.target.id === 'adminKey' && e.key === 'Enter') login();
});
</script>
