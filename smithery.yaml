# Smithery.ai MCP Server Configuration
# This file tells Smithery how to run and list the Rett fra Bonden MCP server.

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      LOKAL_API_URL:
        type: string
        default: "https://rettfrabonden.com"
        description: "URL of the Rett fra Bonden API server"
    required: []
  commandFunction: |-
    (config) => ({
      command: 'npx',
      args: ['tsx', 'src/mcp/server.ts'],
      env: {
        LOKAL_API_URL: config.LOKAL_API_URL || 'https://rettfrabonden.com'
      }
    })
