# Rett fra Bonden — vertikal-konfig v1
#
# Phase 4.1 scope: domene-ordbok + agent-status + connectors.
# Hardkodet "produsent"/"lokalmat" på tvers av services migreres
# inkrementelt i Phase 4.2-4.4 til å lese fra denne fila.
#
# Schedule-felt er informasjonelle pr 4.1 — Cowork scheduler eier
# faktisk dispatching utenfor app. Phase 5 vurderer å gjøre dette til
# single source of truth.

vertical_id: rfb
display_name: Rett fra Bonden
domain: rettfrabonden.com

domain_dictionary:
  entity: produsent
  entity_plural: produsenter
  entity_plural_long: matprodusenter
  service: lokalmat
  buyer: kunde

agents:
  marketing:
    enabled: true
    schedule: "30 7 * * *"
    batch_size: 30
  customer_service:
    enabled: true
    # Hourly fallback til Pub/Sub er live (Phase 3.2 deferred)
    schedule: "0 * * * *"
  enrichment:
    enabled: true
    schedule: "0 4 * * *"
    cap_per_run: 30
  discovery:
    enabled: true
    schedule: "0 5 * * *"
    cap_per_run: 30
  contact_verifier:
    enabled: true
    schedule: "0 10 * * *"
  visibility:
    enabled: true
    schedule: "0 7 * * *"
  supervisor:
    enabled: true
    schedule: "0 12 * * *"

connectors:
  github_repo: slookisen/lokal
  fly_app: lokal
  resend_domain: rettfrabonden.com

# Phase 4.8 KPIs — orchestrator overvåker disse hver kjøring og eskalerer
# ved avvik. Tresholds tunet til faktisk RFB-data 2026-05-03. Reevaluer
# etter 30 dager med v2-marketing-data.
kpis:
  marketing:
    pool_depth_min: 30          # uncontacted producer-leads minimum
    reply_rate_min_pct: 2.0     # rolling 14-batch (justert ned fra 3.0 — v2 trenger tid)
    strict_own_domain_min_pct: 85
  enrichment:
    cap_utilization_min_pct: 80  # bruk minst 80% av cap_per_run=30
    new_agents_per_week_min: 30
  visibility:
    well_known_uptime_min_pct: 99
    ai_bot_visits_min_per_day: 5
  customer_service:
    response_within_hours_max: 24
    p0_open_max_count: 0          # ingen P0 skal være ulest
  platform:
    verifier_backlog_max_pct: 25
    failed_run_max_per_day: 5     # justert opp fra 3 — 9 agenter, realistisk margin
