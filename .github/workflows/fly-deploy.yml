# Auto-deploy to Fly.io on every push to main.
#
# Setup (one-time):
#   1. Create a Fly deploy token: `fly tokens create deploy -a lokal -x 999999h`
#      (or at https://fly.io/apps/lokal/tokens — scope: "Deploy tokens")
#   2. Add it as a GitHub secret: Repo → Settings → Secrets and variables →
#      Actions → New repository secret → Name: FLY_API_TOKEN, Value: <token>
#   3. Done. Every `git push origin main` will now trigger a deploy.
#
# Optional (for signed deploy.completed triggers):
#   4. Generate HMAC secret: `openssl rand -hex 32`
#   5. Set as GitHub secret: TRIGGER_HMAC_SECRET (same value as Fly env var
#      TRIGGER_HMAC_SECRET — both must match for signature verification).
#
# Why this exists: local `fly deploy` is blocked by Windows Application
# Control policy. GitHub-hosted runner has no such restriction.

name: Fly Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main                 # build-check runs on PRs to main; deploy is gated below
  workflow_dispatch:       # lets you trigger manually from Actions tab

jobs:
  build-check:
    name: Type-check + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        # Fail-fast on TypeScript errors before we waste a Fly build slot.
        # Catches things like @types/express 5 req.params.X = string|string[]
        # regression that landed silently between Phase 1.2 and Phase 4.1
        # because the prod runtime uses tsx (no compile-time check) — only
        # `npm run build` enforces tsc, and that ran only on Daniel's local.
        run: npx tsc --noEmit

      - name: Run tests
        env:
          # PR-79 v3: enable TESTDB_TRACE so the SET/RESET/GETDB sequencing
          # of the DB singleton is logged. If the strict-unpinned guard fires
          # again, the trace lines pinpoint which call site set the singleton
          # last and which stack reached getDb() while unpinned.
          TESTDB_TRACE: '1'
        run: npm test

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-check
    # Only deploy on push to main / manual dispatch — PR runs only the gate.
    if: github.event_name != 'pull_request'
    concurrency:
      group: fly-deploy-main
      cancel-in-progress: false   # don't abort a running deploy if a new push arrives
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        # Pass --build-arg BUILD_REV so the Dockerfile's ARG/LABEL/RUN cache-bust
        # block actually invalidates the COPY src/ layer per commit. Without
        # this, Fly's remote builder reuses the cached layer indefinitely
        # (caught 2026-04-27 — F1 search-bug fix didn't ship for that reason).
        run: flyctl deploy --remote-only --build-arg BUILD_REV=${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test
        run: |
          sleep 10
          curl -sf -o /dev/null -w "%{http_code}\n" https://rettfrabonden.com/healthz || \
            curl -sf -o /dev/null -w "%{http_code}\n" https://rettfrabonden.com/

      - name: Notify platform — deploy.completed trigger
        # Posts to /platform/triggers/deploy.completed so platform-verifier
        # can probe the new commit on its next 15-min cycle (or sooner, when
        # we add a "check pending triggers" step to verifier — Phase 3.3b).
        # If TRIGGER_HMAC_SECRET is set, the trigger is signed and lands with
        # signature_verified=true. If not, it lands with signature_verified=false
        # (still recorded — dev mode).
        # Failure of this step does NOT fail the deploy — the deploy already
        # succeeded; this is just observability glue.
        if: success()
        continue-on-error: true
        env:
          TRIGGER_HMAC_SECRET: ${{ secrets.TRIGGER_HMAC_SECRET }}
        run: |
          set -e
          PAYLOAD=$(cat <<JSON
          {"commit":"${{ github.sha }}","actor":"${{ github.actor }}","run_id":"${{ github.run_id }}","run_url":"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}","completed_at":"$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          JSON
          )

          IDEMPOTENCY_KEY="gh-deploy-${{ github.run_id }}-${{ github.run_attempt }}"

          if [ -n "${TRIGGER_HMAC_SECRET}" ]; then
            SIG=$(printf '%s' "${PAYLOAD}" | openssl dgst -sha256 -hmac "${TRIGGER_HMAC_SECRET}" -hex | awk '{print $2}')
            SIG_HEADER="-H X-Trigger-Signature:sha256=${SIG}"
          else
            SIG_HEADER=""
            echo "::warning::TRIGGER_HMAC_SECRET not set — trigger will land unsigned (signature_verified=false)"
          fi

          HTTP_CODE=$(curl -s -o /tmp/trigger-resp.json --max-time 12 -w "%{http_code}" -X POST \
            -H "X-Idempotency-Key: ${IDEMPOTENCY_KEY}" \
            -H "X-Trigger-Source: github-actions" \
            -H "Content-Type: application/json" \
            ${SIG_HEADER} \
            -d "${PAYLOAD}" \
            https://rettfrabonden.com/platform/triggers/deploy.completed)

          echo "Trigger POST: HTTP ${HTTP_CODE}"
          cat /tmp/trigger-resp.json
          echo ""

          # 200 expected. Anything else: warn but don't fail the workflow.
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::warning::Trigger POST returned HTTP ${HTTP_CODE} — see response body above"
          fi
